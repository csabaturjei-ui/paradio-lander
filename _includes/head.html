<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>{% if page.title %}{{ page.title }} | {% endif %}Post Apocalyptic Radio</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Decentralized music streaming — 0% cut, community-curated, built on Solana and IPFS{% endif %}">
{% if page.canonical %}
<link rel="canonical" href="{{ page.canonical }}">
{% endif %}
{% if page.og_title %}
<meta property="og:title" content="{{ page.og_title }}">
<meta property="og:description" content="{{ page.og_description | default: page.description }}">
<meta property="og:url" content="{{ page.canonical | default: site.url }}">
<meta name="twitter:card" content="summary">
{% endif %}
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
<link href="/static/css/main.dd476194.css" rel="stylesheet">
<style>
  .text-shadow-glow { text-shadow: 0 0 6px rgba(57,255,20,0.55); }
  .nav-a { color: #39ff14; font-family: 'Share Tech Mono', monospace; text-decoration: none; font-size: 0.85rem; opacity: 0.85; transition: opacity 0.2s; }
  .nav-a:hover { opacity: 1; }
  .nav-a.active { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }
  .glow-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle, rgba(57,255,20,0.07) 0%, transparent 70%); pointer-events: none; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(57,255,20,0.25), transparent); }
  .badge { display: inline-block; padding: 0.2rem 0.9rem; border: 1px solid rgba(57,255,20,0.35); border-radius: 9999px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: #29a331; margin-bottom: 1.25rem; }
  .feature-icon { font-size: 2rem; margin-bottom: 0.875rem; line-height: 1; }
  .step-num { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 50%; background: rgba(57,255,20,0.15); border: 1px solid rgba(57,255,20,0.4); font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.85rem; color: #39ff14; flex-shrink: 0; }
  .social-link { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(57,255,20,0.3); color: #39ff14; text-decoration: none; transition: all 0.3s; }
  .social-link:hover { border-color: #39ff14; background: rgba(57,255,20,0.1); transform: scale(1.1); box-shadow: 0 0 12px rgba(57,255,20,0.3); }
  .path-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem 2rem; border-radius: 0.375rem; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: all 0.3s; min-width: 14rem; }
  .path-btn-artist { background: #39ff14; color: #0a0a0a; border: none; }
  .path-btn-artist:hover { background: #5fff3d; box-shadow: 0 0 20px rgba(57,255,20,0.4); }
  .path-btn-fan { background: transparent; color: #39ff14; border: 2px solid rgba(57,255,20,0.5); }
  .path-btn-fan:hover { border-color: #39ff14; background: rgba(57,255,20,0.08); box-shadow: 0 0 20px rgba(57,255,20,0.2); }
  .role-pill { padding: 0.4rem 1rem; border-radius: 9999px; border: 1px solid rgba(57,255,20,0.35); background: transparent; color: #29a331; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .role-pill.active, .role-pill:hover { border-color: #39ff14; color: #39ff14; background: rgba(57,255,20,0.1); }
</style>
